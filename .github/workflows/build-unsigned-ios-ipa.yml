name: Build unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  unsigned-ipa:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25.8.0
          cache: npm

      - name: Install JS dependencies
        run: |
          npm install --global npm@11.11.0
          node --version
          npm --version
          npm ci

      - name: Show Xcode and SDKs
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --clean --non-interactive

      - name: Verify native module registration
        run: |
          set -euo pipefail

          test -f modules/liquid-glass-capture/ios/LiquidGlassCaptureNative.podspec
          npm ls liquid-glass-capture --depth=0

          grep -R "LiquidGlassCaptureNative" ios/Podfile.lock

          PROVIDER="$(find ios -name ExpoModulesProvider.swift -type f | head -n 1)"
          if [ -z "$PROVIDER" ]; then
            echo "ExpoModulesProvider.swift was not generated"
            exit 1
          fi

          echo "provider=$PROVIDER"
          grep "import LiquidGlassCaptureNative" "$PROVIDER"
          grep "LiquidGlassCaptureModule.self" "$PROVIDER"

      - name: Build unsigned device app
        run: |
          set -euo pipefail
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' | head -n 1)"
          if [ -z "$WORKSPACE" ]; then
            echo "No Xcode workspace found under ios/"
            exit 1
          fi

          xcodebuild -list -workspace "$WORKSPACE"
          SCHEMES_JSON="$(xcodebuild -list -json -workspace "$WORKSPACE")"
          SCHEME="$(python3 - "$SCHEMES_JSON" <<'PY'
          import json
          import sys

          schemes = json.loads(sys.argv[1]).get("workspace", {}).get("schemes", [])
          preferred = [
              "LiquidGlassCapture (LiquidGlassCapture project)",
              "LiquidGlassCapture",
          ]
          for scheme in preferred:
              if scheme in schemes:
                  print(scheme)
                  raise SystemExit(0)
          for scheme in schemes:
              if scheme.startswith("LiquidGlassCapture") and "Pods project" not in scheme:
                  print(scheme)
                  raise SystemExit(0)
          print(f"No app LiquidGlassCapture scheme found. Got: {schemes}", file=sys.stderr)
          raise SystemExit(1)
          PY
          )"

          echo "workspace=$WORKSPACE"
          echo "scheme=$SCHEME"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 2 -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found under Release-iphoneos"
            find build/DerivedData/Build/Products -maxdepth 4 -type d || true
            exit 1
          fi

          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          (cd dist && /usr/bin/zip -qry LiquidGlassCapture-unsigned.ipa Payload)
          ls -lh dist/LiquidGlassCapture-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v7
        with:
          name: LiquidGlassCapture-unsigned-ipa
          path: dist/LiquidGlassCapture-unsigned.ipa
          if-no-files-found: error
