name: Glass Gate

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  glass-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25.8.0
          cache: npm

      - name: Install JS dependencies
        run: |
          npm install --global npm@11.11.0
          node --version
          npm --version
          npm ci

      - name: Run glass gate
        run: npm run ci:glass -- --out artifacts/ci/glass-gate.report.json

      - name: Upload glass gate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: glass-gate-report
          path: artifacts/ci/glass-gate.report.json
          if-no-files-found: error
